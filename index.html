<!DOCTYPE html>
<!--
  Made for a beautiful little boy,
  born beneath the golden African sun,
  with more light in his eyes
  than the whole wide world around him.

  A heart so full of wonder,
  a soul so warm and bright,
  spilling love and laughter
  into every ordinary day.

  He carries joy so naturally,
  like sunshine carries heat-
  a little boy with a spirit
  far bigger than the skies above him.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word of the Day for Kids | Fun Vocabulary Activity</title>
  <meta name="description" content="A playful daily vocabulary word for kids with pronunciation, meaning, sentence practice, and a drawing activity." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://fun-word.co.za/" />
  <meta name="theme-color" content="#59cad8" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Word of the Day for Kids" />
  <meta property="og:description" content="Discover a fun daily word with pronunciation, meaning, sentence practice, and a drawing activity for kids." />
  <meta property="og:url" content="https://fun-word.co.za/" />
  <meta property="og:image" content="https://fun-word.co.za/word-of-the-day-kids-hero.webp" />
  <meta property="og:image:alt" content="Word of the Day scene with a smiling child and storybook friends" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Word of the Day for Kids" />
  <meta name="twitter:description" content="A playful daily vocabulary activity for young learners." />
  <meta name="twitter:image" content="https://fun-word.co.za/word-of-the-day-kids-hero.webp" />
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LearningResource",
      "name": "Word of the Day for Kids",
      "description": "A playful daily vocabulary activity for children with pronunciation, meaning, sentence practice, and drawing prompts.",
      "url": "https://fun-word.co.za/",
      "image": "https://fun-word.co.za/word-of-the-day-kids-hero.webp",
      "learningResourceType": "Vocabulary activity",
      "educationalLevel": "Preschool, Early elementary",
      "audience": {
        "@type": "EducationalAudience",
        "educationalRole": "student"
      },
      "inLanguage": "en"
    }
  </script>
  <link rel="stylesheet" href="styles.css?v=20260624-mobile-scroll" />
</head>
<body>
  <main class="page-shell" aria-label="Word of the Day">
    <section class="hero-scene" aria-label="Create your Word of the Day story">
      <img class="hero-image" src="word-of-the-day-kids-hero.webp" alt="Boy in red glasses with storybook friends" />

      <img class="brand-logo" src="word-of-the-day-logo.webp" alt="Word of the Day" />
      <button class="word-prompt" type="button" aria-label="Show today's word">
        Tap for today's word
      </button>
      <div class="thought-layer" aria-live="polite"></div>
    </section>

    <section class="steps" aria-label="How it works">
      <div class="step-track" aria-hidden="true"></div>

      <article class="step-card activity-card">
        <div class="step-icon say-icon" aria-hidden="true">
          <span class="speech"></span>
          <span class="sound sound-one"></span>
          <span class="sound sound-two"></span>
        </div>
        <h2>Say it</h2>
        <button class="audio-button activity-audio" type="button" aria-label="Hear today's word pronounced">
          <svg class="audio-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path class="audio-speaker" d="M4 9v6h4l5 4V5L8 9H4z" />
            <path class="audio-wave wave-one" d="M16 9.5c.8.7 1.2 1.5 1.2 2.5s-.4 1.8-1.2 2.5" />
            <path class="audio-wave wave-two" d="M18.4 7.2c1.4 1.3 2.1 2.9 2.1 4.8s-.7 3.5-2.1 4.8" />
          </svg>
        </button>
        <p id="sayActivity">ma-gic</p>
      </article>

      <article class="step-card activity-card">
        <div class="step-icon use-icon" aria-hidden="true">
          <span class="book-page left-page"></span>
          <span class="book-page right-page"></span>
          <span class="sentence-line line-one"></span>
          <span class="sentence-line line-two"></span>
        </div>
        <h2>Use it</h2>
        <p id="useActivity">The magic trick made everyone smile.</p>
      </article>

      <article class="step-card activity-card">
        <div class="step-icon try-icon" aria-hidden="true">
          <span class="target"></span>
          <span class="target-dot"></span>
          <span class="checkmark"></span>
        </div>
        <h2>Try it</h2>
        <p id="tryActivity">Use the word when you talk today.</p>
      </article>

      <article class="step-card activity-card">
        <div class="step-icon draw-icon" aria-hidden="true">
          <span class="palette"></span>
          <span class="paint paint-one"></span>
          <span class="paint paint-two"></span>
          <span class="crayon"></span>
        </div>
        <h2>Draw it</h2>
        <p id="drawActivity">Draw something magical.</p>
      </article>
    </section>
  </main>

  <script data-goatcounter="https://fun-word.goatcounter.com/count"
    async src="//gc.zgo.at/count.js"></script>
  <script src="script.js?v=20260624-speaker-icon"></script>
</body>
</html>
