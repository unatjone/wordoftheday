<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word of the Day</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-shell" aria-label="Word of the Day">
    <section class="hero-scene" aria-label="Create your Word of the Day story">
      <img class="hero-image" src="boy.png" alt="Boy in red glasses with storybook friends" />

      <img class="brand-logo" src="logo.png" alt="Word of the Day" />
      <div class="thought-layer" aria-live="polite"></div>
    </section>

    <section class="steps" aria-label="How it works">
      <div class="step-track" aria-hidden="true"></div>

      <article class="step-card activity-card">
        <div class="step-icon say-icon" aria-hidden="true">
          <span class="speech"></span>
          <span class="sound sound-one"></span>
          <span class="sound sound-two"></span>
        </div>
        <h2>Say it</h2>
        <p id="sayActivity">ma-gic</p>
      </article>

      <article class="step-card activity-card">
        <div class="step-icon use-icon" aria-hidden="true">
          <span class="book-page left-page"></span>
          <span class="book-page right-page"></span>
          <span class="sentence-line line-one"></span>
          <span class="sentence-line line-two"></span>
        </div>
        <h2>Use it</h2>
        <p id="useActivity">The magic trick made everyone smile.</p>
      </article>

      <article class="step-card activity-card">
        <div class="step-icon try-icon" aria-hidden="true">
          <span class="target"></span>
          <span class="target-dot"></span>
          <span class="checkmark"></span>
        </div>
        <h2>Try it</h2>
        <p id="tryActivity">Use the word when you talk today.</p>
      </article>

      <article class="step-card activity-card">
        <div class="step-icon draw-icon" aria-hidden="true">
          <span class="palette"></span>
          <span class="paint paint-one"></span>
          <span class="paint paint-two"></span>
          <span class="crayon"></span>
        </div>
        <h2>Draw it</h2>
        <p id="drawActivity">Draw something magical.</p>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
